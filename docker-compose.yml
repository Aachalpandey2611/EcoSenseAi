version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecosense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecosense}
      POSTGRES_DB: ${POSTGRES_DB:-ecosense}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosense"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ecosense}:${POSTGRES_PASSWORD:-ecosense}@db:5432/${POSTGRES_DB:-ecosense}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-a-64-char-hex-string}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174,http://localhost:5173}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-False}
      - FRONTEND_URL=${FRONTEND_URL:-}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8005/api/v1}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
      - VITE_RAZORPAY_KEY_ID=${VITE_RAZORPAY_KEY_ID:-}
    depends_on:
      - backend

volumes:
  postgres_data:
